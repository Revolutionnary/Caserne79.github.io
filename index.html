<body>

    <h1>Recrutement Pompier Volontaire</h1>

    <form action="/submit-page" method="POST">
    

        <h2>Formulaire de recrutement</h2><img src="caserne79.png" width="20%">

        <input type="password" placeholder="Enter your password"><br>

        <input type="number" placeholder="+1 xxx-xxx-xxxx">
        <br>
        <label for="id_CV" id="CV">CV</label>
        <input type="file" id="css_file">        
        <br>
        <button type="submit" class="btn-gradient">Envoyer</button>
    </form>
